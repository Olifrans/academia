<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>GYM PRO ELITE | Gestão Profissional de Academia</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0a0f2a 0%, #1a1a3a 50%, #0f0c29 100%);
    color: #ffffff;
    min-height: 100vh;
    padding-bottom: 80px;
    overflow-x: hidden;
}

/* Glassmorphism Effect */
.glass-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

/* Header */
header {
    background: rgba(10, 15, 42, 0.8);
    backdrop-filter: blur(20px);
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid rgba(0, 255, 136, 0.3);
    position: sticky;
    top: 0;
    z-index: 100;
}

.logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.logo i {
    font-size: 2rem;
    color: #00ff88;
    filter: drop-shadow(0 0 8px rgba(0,255,136,0.5));
}

.logo h1 {
    font-size: 1.6rem;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #00ff88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.logo span {
    font-size: 0.8rem;
    background: rgba(0,255,136,0.2);
    padding: 2px 8px;
    border-radius: 20px;
    margin-left: 8px;
}

/* Container */
.container {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
}

/* Cards */
.card {
    background: rgba(15, 25, 45, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 28px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(0, 255, 136, 0.15);
    transition: all 0.3s ease;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
}

.card:hover {
    transform: translateY(-4px);
    border-color: rgba(0, 255, 136, 0.4);
    box-shadow: 0 12px 40px rgba(0, 255, 136, 0.15);
}

.card h3 {
    font-size: 1.25rem;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #00ff88;
    border-left: 3px solid #00ff88;
    padding-left: 12px;
}

.card h3 i {
    font-size: 1.2rem;
}

/* Form Elements */
input, select, textarea {
    width: 100%;
    padding: 14px 16px;
    margin: 8px 0;
    background: rgba(10, 15, 35, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    color: #fff;
    font-size: 0.95rem;
    transition: all 0.2s;
    font-family: inherit;
}

input:focus, select:focus {
    outline: none;
    border-color: #00ff88;
    box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.2);
}

button {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    background: linear-gradient(135deg, #00ff88, #00cc6a);
    border: none;
    border-radius: 20px;
    color: #0a0f2a;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: inherit;
}

button:active {
    transform: scale(0.97);
}

button i {
    font-size: 1rem;
}

/* Navigation */
.nav-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-width: 600px;
    margin: 0 auto;
    background: rgba(10, 15, 42, 0.95);
    backdrop-filter: blur(20px);
    display: flex;
    border-top: 1px solid rgba(0, 255, 136, 0.2);
    border-radius: 30px 30px 0 0;
    z-index: 200;
}

.nav-item {
    flex: 1;
    background: transparent;
    margin: 0;
    border-radius: 0;
    padding: 12px 0;
    flex-direction: column;
    gap: 4px;
    color: #888;
    transition: all 0.2s;
}

.nav-item i {
    font-size: 1.3rem;
    margin: 0;
}

.nav-item span {
    font-size: 0.7rem;
}

.nav-item.active {
    color: #00ff88;
    background: rgba(0, 255, 136, 0.1);
    border-top: 2px solid #00ff88;
}

/* Alert Cards */
.alert-card {
    background: linear-gradient(135deg, rgba(239, 68, 68, 0.9), rgba(220, 38, 38, 0.9));
    backdrop-filter: blur(8px);
    padding: 14px;
    border-radius: 20px;
    margin: 12px 0;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.3s ease;
}

.alert-warning {
    background: linear-gradient(135deg, rgba(249, 115, 22, 0.9), rgba(234, 88, 12, 0.9));
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

/* List Items */
.list-item {
    background: rgba(10, 15, 35, 0.6);
    margin: 10px 0;
    padding: 14px 16px;
    border-radius: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
    border-left: 3px solid #00ff88;
}

.list-item:hover {
    background: rgba(0, 255, 136, 0.1);
    transform: translateX(4px);
}

.item-info {
    flex: 1;
}

.item-name {
    font-weight: 600;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
}

.item-detail {
    font-size: 0.75rem;
    opacity: 0.7;
    margin-top: 4px;
}

.delete-btn {
    background: rgba(239, 68, 68, 0.2);
    padding: 8px 14px;
    width: auto;
    margin: 0;
    border-radius: 30px;
    color: #ef4444;
    font-size: 0.8rem;
}

.delete-btn:hover {
    background: #ef4444;
    color: white;
}

/* Stats Grid */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}

.stat-card {
    background: rgba(0, 255, 136, 0.1);
    border-radius: 20px;
    padding: 14px;
    text-align: center;
    border: 1px solid rgba(0, 255, 136, 0.2);
}

.stat-value {
    font-size: 2rem;
    font-weight: 700;
    color: #00ff88;
}

.stat-label {
    font-size: 0.75rem;
    opacity: 0.8;
    margin-top: 4px;
}

/* Charts */
canvas {
    max-height: 250px;
    margin-top: 16px;
    background: rgba(10, 15, 35, 0.5);
    border-radius: 20px;
    padding: 10px;
}

/* Empty State */
.empty-state {
    text-align: center;
    padding: 40px 20px;
    opacity: 0.6;
}

.empty-state i {
    font-size: 3rem;
    margin-bottom: 12px;
    color: #00ff88;
}

/* Result Card */
.result-card {
    background: linear-gradient(135deg, #00ff88, #00cc6a);
    padding: 14px;
    border-radius: 20px;
    margin-top: 16px;
    text-align: center;
    font-weight: 600;
    color: #0a0f2a;
}

/* Badge */
.badge {
    background: #00ff88;
    color: #0a0f2a;
    padding: 2px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-left: 8px;
}

/* Utility */
.hidden {
    display: none;
}

.section {
    display: none;
}

.section.active {
    display: block;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<header>
    <div class="logo">
        <i class="fas fa-dumbbell"></i>
        <h1>GYM PRO ELITE <span>v2.0</span></h1>
    </div>
</header>

<div class="container">
    <!-- SECTION HOME / DASHBOARD -->
    <div id="homeSection" class="section active">
        <div id="alertContainer"></div>
        <div class="card">
            <h3><i class="fas fa-chart-line"></i> Dashboard</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalAlunos">0</div>
                    <div class="stat-label">Alunos Ativos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalTreinos">0</div>
                    <div class="stat-label">Treinos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalMetricas">0</div>
                    <div class="stat-label">Avaliações</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="mediaIMC">0</div>
                    <div class="stat-label">IMC Médio</div>
                </div>
            </div>
            <canvas id="chartAlunosMes"></canvas>
            <canvas id="chartTreinosDist" style="margin-top: 20px;"></canvas>
        </div>
    </div>

    <!-- SECTION ALUNOS -->
    <div id="alunosSection" class="section">
        <div class="card">
            <h3><i class="fas fa-user-plus"></i> Novo Aluno</h3>
            <input type="text" id="nomeAluno" placeholder="Nome completo" autocomplete="off">
            <select id="planoAluno">
                <option value="30">📆 Mensal (30 dias)</option>
                <option value="90">📅 Trimestral (90 dias)</option>
                <option value="365">⭐ Anual (365 dias)</option>
            </select>
            <button onclick="cadastrarAluno()"><i class="fas fa-save"></i> Cadastrar Aluno</button>
        </div>
        <div class="card">
            <h3><i class="fas fa-users"></i> Lista de Alunos</h3>
            <div id="listaAlunosContainer"></div>
        </div>
    </div>

    <!-- SECTION TREINOS A/B/C -->
    <div id="treinosSection" class="section">
        <div class="card">
            <h3><i class="fas fa-clipboard-list"></i> Ficha de Treino</h3>
            <select id="selectAlunoTreino"></select>
            <select id="tipoTreino">
                <option value="A">🔥 TREINO A (Superior)</option>
                <option value="B">💪 TREINO B (Inferior)</option>
                <option value="C">⚡ TREINO C (Full Body)</option>
            </select>
            <input type="text" id="descTreino" placeholder="Ex: Supino, Rosca, Tríceps, Agachamento...">
            <button onclick="salvarTreino()"><i class="fas fa-dumbbell"></i> Atribuir Treino</button>
        </div>
        <div class="card">
            <h3><i class="fas fa-history"></i> Histórico de Treinos</h3>
            <div id="listaTreinosContainer"></div>
        </div>
    </div>

    <!-- SECTION MÉTRICAS -->
    <div id="metricasSection" class="section">
        <div class="card">
            <h3><i class="fas fa-heartbeat"></i> Avaliação Física</h3>
            <select id="selectAlunoMetrica"></select>
            <input type="number" id="pesoAluno" step="0.1" placeholder="Peso (kg)">
            <input type="number" id="alturaAluno" step="0.01" placeholder="Altura (m)">
            <input type="number" id="gorduraAluno" step="0.1" placeholder="% Gordura (opcional)">
            <button onclick="salvarMetrica()"><i class="fas fa-chart-line"></i> Salvar Métrica</button>
        </div>
        <div class="card">
            <h3><i class="fas fa-chart-line"></i> Evolução do Peso</h3>
            <canvas id="graficoEvolucao"></canvas>
            <div id="imcInfo" class="result-card"></div>
        </div>
    </div>
</div>

<div class="nav-bar">
    <button class="nav-item active" onclick="mudarTela('home')" data-tela="home"><i class="fas fa-home"></i><span>Início</span></button>
    <button class="nav-item" onclick="mudarTela('alunos')" data-tela="alunos"><i class="fas fa-users"></i><span>Alunos</span></button>
    <button class="nav-item" onclick="mudarTela('treinos')" data-tela="treinos"><i class="fas fa-dumbbell"></i><span>Treinos</span></button>
    <button class="nav-item" onclick="mudarTela('metricas')" data-tela="metricas"><i class="fas fa-chart-simple"></i><span>Métricas</span></button>
</div>

<script>
// ==================== DATA MODELS ====================
let alunos = JSON.parse(localStorage.getItem("gym_alunos")) || [];
let treinos = JSON.parse(localStorage.getItem("gym_treinos")) || [];
let metricas = JSON.parse(localStorage.getItem("gym_metricas")) || [];

// Gráficos
let chartAlunosMes = null;
let chartTreinosDist = null;
let chartEvolucao = null;

// ==================== FUNÇÕES AUXILIARES ====================
function salvarDados() {
    localStorage.setItem("gym_alunos", JSON.stringify(alunos));
    localStorage.setItem("gym_treinos", JSON.stringify(treinos));
    localStorage.setItem("gym_metricas", JSON.stringify(metricas));
}

function mudarTela(tela) {
    document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
    document.getElementById(`${tela}Section`).classList.add('active');
    
    document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.nav-item[data-tela="${tela}"]`).classList.add('active');
    
    renderizarTudo();
}

// ==================== ALUNOS ====================
function cadastrarAluno() {
    let nome = document.getElementById("nomeAluno").value.trim();
    if (!nome) {
        Swal.fire("Atenção", "Digite o nome do aluno", "warning");
        return;
    }
    
    let dias = parseInt(document.getElementById("planoAluno").value);
    let vencimento = new Date();
    vencimento.setDate(vencimento.getDate() + dias);
    
    let novoAluno = {
        id: Date.now(),
        nome: nome,
        vencimento: vencimento.toISOString(),
        dataCadastro: new Date().toISOString()
    };
    
    alunos.push(novoAluno);
    salvarDados();
    document.getElementById("nomeAluno").value = "";
    
    Swal.fire({
        icon: 'success',
        title: 'Aluno Cadastrado!',
        text: `${nome} - Plano ${dias} dias`,
        timer: 2000,
        showConfirmButton: false
    });
    renderizarTudo();
}

function deletarAluno(id) {
    Swal.fire({
        title: 'Excluir Aluno?',
        text: 'Todos os treinos e métricas deste aluno também serão removidos!',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        confirmButtonText: 'Sim, excluir',
        cancelButtonText: 'Cancelar'
    }).then((result) => {
        if (result.isConfirmed) {
            alunos = alunos.filter(a => a.id !== id);
            treinos = treinos.filter(t => t.alunoId !== id);
            metricas = metricas.filter(m => m.alunoId !== id);
            salvarDados();
            Swal.fire('Excluído!', 'Aluno removido com sucesso.', 'success');
            renderizarTudo();
        }
    });
}

function renderizarAlunos() {
    let container = document.getElementById("listaAlunosContainer");
    if (alunos.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash"></i><br>Nenhum aluno cadastrado</div>`;
        return;
    }
    
    container.innerHTML = alunos.map(aluno => {
        let venc = new Date(aluno.vencimento);
        let hoje = new Date();
        let statusClass = venc < hoje ? '⚠️ VENCIDO' : (venc - hoje < 7*24*60*60*1000 ? '⏰ Próximo' : '✅ Ativo');
        return `
            <div class="list-item">
                <div class="item-info">
                    <div class="item-name"><i class="fas fa-user"></i> ${aluno.nome}</div>
                    <div class="item-detail">📅 Venc: ${venc.toLocaleDateString('pt-BR')} | ${statusClass}</div>
                </div>
                <button class="delete-btn" onclick="deletarAluno(${aluno.id})"><i class="fas fa-trash"></i> Excluir</button>
            </div>
        `;
    }).join("");
}

// ==================== ALERTAS ====================
function gerarAlertas() {
    let hoje = new Date();
    hoje.setHours(0, 0, 0, 0);
    let alertas = [];
    
    alunos.forEach(aluno => {
        let venc = new Date(aluno.vencimento);
        let diffDias = Math.ceil((venc - hoje) / (1000 * 60 * 60 * 24));
        
        if (venc < hoje) {
            alertas.push({ tipo: 'vencido', nome: aluno.nome, dias: 0 });
        } else if (diffDias <= 7) {
            alertas.push({ tipo: 'proximo', nome: aluno.nome, dias: diffDias });
        }
    });
    
    let container = document.getElementById("alertContainer");
    if (alertas.length === 0) {
        container.innerHTML = `<div class="card" style="background: rgba(0,255,136,0.1); text-align:center;">✅ Todos os alunos com plano em dia!</div>`;
        return;
    }
    
    container.innerHTML = alertas.map(alert => {
        if (alert.tipo === 'vencido') {
            return `<div class="alert-card"><i class="fas fa-exclamation-triangle"></i> <strong>⚠️ ${alert.nome}</strong> - Plano VENCIDO! Renove imediatamente.</div>`;
        } else {
            return `<div class="alert-card alert-warning"><i class="fas fa-clock"></i> <strong>⏰ ${alert.nome}</strong> - Vence em ${alert.dias} dias! Renove agora.</div>`;
        }
    }).join("");
}

// ==================== TREINOS ====================
function salvarTreino() {
    let nomeAluno = document.getElementById("selectAlunoTreino").value;
    if (!nomeAluno) {
        Swal.fire("Erro", "Selecione um aluno", "error");
        return;
    }
    
    let aluno = alunos.find(a => a.nome === nomeAluno);
    if (!aluno) return;
    
    let tipo = document.getElementById("tipoTreino").value;
    let desc = document.getElementById("descTreino").value.trim();
    
    if (!desc) {
        Swal.fire("Atenção", "Descreva os exercícios do treino", "info");
        return;
    }
    
    let novoTreino = {
        id: Date.now(),
        alunoId: aluno.id,
        alunoNome: aluno.nome,
        tipo: tipo,
        descricao: desc,
        data: new Date().toISOString()
    };
    
    treinos.push(novoTreino);
    salvarDados();
    document.getElementById("descTreino").value = "";
    
    Swal.fire("Treino Salvo!", `Treino ${tipo} atribuído para ${aluno.nome}`, "success");
    renderizarTudo();
}

function deletarTreino(id) {
    treinos = treinos.filter(t => t.id !== id);
    salvarDados();
    Swal.fire("Removido!", "Treino excluído com sucesso.", "info");
    renderizarTudo();
}

function renderizarTreinos() {
    let container = document.getElementById("listaTreinosContainer");
    if (treinos.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-clipboard"></i><br>Nenhum treino registrado</div>`;
        return;
    }
    
    let treinosOrdenados = [...treinos].reverse();
    container.innerHTML = treinosOrdenados.map(t => `
        <div class="list-item">
            <div class="item-info">
                <div class="item-name"><i class="fas fa-dumbbell"></i> ${t.alunoNome} - Treino ${t.tipo}</div>
                <div class="item-detail">📝 ${t.descricao.substring(0, 50)}${t.descricao.length > 50 ? '...' : ''}</div>
                <div class="item-detail">📅 ${new Date(t.data).toLocaleDateString('pt-BR')}</div>
            </div>
            <button class="delete-btn" onclick="deletarTreino(${t.id})"><i class="fas fa-trash"></i></button>
        </div>
    `).join("");
}

// ==================== MÉTRICAS ====================
function salvarMetrica() {
    let nomeAluno = document.getElementById("selectAlunoMetrica").value;
    if (!nomeAluno) {
        Swal.fire("Erro", "Selecione um aluno", "error");
        return;
    }
    
    let aluno = alunos.find(a => a.nome === nomeAluno);
    if (!aluno) return;
    
    let peso = parseFloat(document.getElementById("pesoAluno").value);
    let altura = parseFloat(document.getElementById("alturaAluno").value);
    let gordura = document.getElementById("gorduraAluno").value;
    let gorduraVal = gordura ? parseFloat(gordura) : null;
    
    if (isNaN(peso) || isNaN(altura)) {
        Swal.fire("Atenção", "Preencha peso e altura corretamente", "warning");
        return;
    }
    
    let imc = peso / (altura * altura);
    let classificacao = "";
    if (imc < 18.5) classificacao = "Abaixo do peso";
    else if (imc < 25) classificacao = "Peso normal";
    else if (imc < 30) classificacao = "Sobrepeso";
    else classificacao = "Obesidade";
    
    let novaMetrica = {
        id: Date.now(),
        alunoId: aluno.id,
        alunoNome: aluno.nome,
        peso: peso,
        altura: altura,
        gordura: gorduraVal,
        imc: imc.toFixed(1),
        classificacao: classificacao,
        data: new Date().toISOString()
    };
    
    metricas.push(novaMetrica);
    salvarDados();
    
    document.getElementById("pesoAluno").value = "";
    document.getElementById("alturaAluno").value = "";
    document.getElementById("gorduraAluno").value = "";
    
    Swal.fire("Métrica Salva!", `IMC: ${imc.toFixed(1)} - ${classificacao}`, "success");
    renderizarTudo();
}

function deletarMetrica(id) {
    metricas = metricas.filter(m => m.id !== id);
    salvarDados();
    renderizarTudo();
}

// ==================== GRÁFICOS ====================
function atualizarGraficos() {
    // Gráfico de alunos por mês
    let meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
    let contagemMeses = new Array(12).fill(0);
    alunos.forEach(aluno => {
        let data = new Date(aluno.dataCadastro || aluno.vencimento);
        let mes = data.getMonth();
        contagemMeses[mes]++;
    });
    
    let ctx1 = document.getElementById("chartAlunosMes").getContext("2d");
    if (chartAlunosMes) chartAlunosMes.destroy();
    chartAlunosMes = new Chart(ctx1, {
        type: 'bar',
        data: { labels: meses, datasets: [{ label: 'Alunos Cadastrados', data: contagemMeses, backgroundColor: '#00ff88', borderRadius: 10 }] },
        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#fff' } } } }
    });
    
    // Gráfico distribuição treinos
    let countA = treinos.filter(t => t.tipo === 'A').length;
    let countB = treinos.filter(t => t.tipo === 'B').length;
    let countC = treinos.filter(t => t.tipo === 'C').length;
    let ctx2 = document.getElementById("chartTreinosDist").getContext("2d");
    if (chartTreinosDist) chartTreinosDist.destroy();
    chartTreinosDist = new Chart(ctx2, {
        type: 'doughnut',
        data: { labels: ['Treino A', 'Treino B', 'Treino C'], datasets: [{ data: [countA, countB, countC], backgroundColor: ['#00ff88', '#3b82f6', '#f97316'] }] },
        options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } } }
    });
}

function atualizarGraficoEvolucao() {
    let select = document.getElementById("selectAlunoMetrica");
    let nomeSelecionado = select.value;
    
    if (!nomeSelecionado || alunos.length === 0) {
        if (chartEvolucao) chartEvolucao.destroy();
        document.getElementById("imcInfo").innerHTML = "📊 Selecione um aluno para ver a evolução";
        return;
    }
    
    let metricasAluno = metricas.filter(m => m.alunoNome === nomeSelecionado).sort((a,b) => new Date(a.data) - new Date(b.data));
    
    if (metricasAluno.length === 0) {
        if (chartEvolucao) chartEvolucao.destroy();
        document.getElementById("imcInfo").innerHTML = "📉 Nenhuma avaliação registrada para este aluno";
        return;
    }
    
    let labels = metricasAluno.map(m => new Date(m.data).toLocaleDateString('pt-BR'));
    let pesos = metricasAluno.map(m => m.peso);
    
    let ctx = document.getElementById("graficoEvolucao").getContext("2d");
    if (chartEvolucao) chartEvolucao.destroy();
    chartEvolucao = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{ label: 'Peso (kg)', data: pesos, borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', fill: true, tension: 0.3, pointBackgroundColor: '#00ff88' }]
        },
        options: { responsive: true, plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.raw} kg` } } } }
    });
    
    let ultima = metricasAluno[metricasAluno.length - 1];
    document.getElementById("imcInfo").innerHTML = `
        <strong>📊 Última Avaliação</strong><br>
        IMC: ${ultima.imc} - ${ultima.classificacao}<br>
        Peso: ${ultima.peso}kg | Data: ${new Date(ultima.data).toLocaleDateString('pt-BR')}
    `;
}

// ==================== DASHBOARD ====================
function atualizarDashboard() {
    document.getElementById("totalAlunos").innerText = alunos.length;
    document.getElementById("totalTreinos").innerText = treinos.length;
    document.getElementById("totalMetricas").innerText = metricas.length;
    
    let imcs = metricas.map(m => parseFloat(m.imc)).filter(i => !isNaN(i));
    let mediaImc = imcs.length ? (imcs.reduce((a,b) => a+b, 0) / imcs.length).toFixed(1) : 0;
    document.getElementById("mediaIMC").innerText = mediaImc;
}

// ==================== RENDERIZAÇÃO GERAL ====================
function renderizarSelects() {
    let options = alunos.map(a => `<option value="${a.nome}">${a.nome}</option>`).join("");
    document.getElementById("selectAlunoTreino").innerHTML = options || "<option>Nenhum aluno</option>";
    document.getElementById("selectAlunoMetrica").innerHTML = options || "<option>Nenhum aluno</option>";
}

function renderizarTudo() {
    renderizarAlunos();
    renderizarTreinos();
    renderizarSelects();
    atualizarDashboard();
    atualizarGraficos();
    atualizarGraficoEvolucao();
    gerarAlertas();
}

// Inicialização
renderizarTudo();

// Event listener para mudança de aluno no gráfico
document.getElementById("selectAlunoMetrica")?.addEventListener("change", () => atualizarGraficoEvolucao());
</script>
</body>
</html>
