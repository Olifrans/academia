<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>GYM PRO ELITE | Sistema Completo de Academia</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    color: #fff;
    min-height: 100vh;
    padding-bottom: 75px;
}

header {
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(12px);
    padding: 18px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(34, 197, 94, 0.3);
    position: sticky;
    top: 0;
    z-index: 100;
}

header h1 {
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    letter-spacing: 1px;
}

header h1 i {
    color: #22c55e;
    font-size: 1.8rem;
}

.container {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
}

.card {
    background: rgba(30, 41, 59, 0.85);
    backdrop-filter: blur(4px);
    border-radius: 24px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(34, 197, 94, 0.2);
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.card:hover {
    transform: translateY(-2px);
    border-color: rgba(34, 197, 94, 0.5);
    box-shadow: 0 12px 28px rgba(0,0,0,0.4);
}

.card h3 {
    margin-bottom: 16px;
    font-size: 1.3rem;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #22c55e;
    border-left: 4px solid #22c55e;
    padding-left: 12px;
}

input, select, button {
    padding: 12px 16px;
    margin: 8px 0;
    width: 100%;
    border-radius: 16px;
    border: none;
    font-size: 1rem;
    font-family: inherit;
    transition: all 0.2s;
}

input, select {
    background: #0f172a;
    color: #fff;
    border: 1px solid #334155;
}

input:focus, select:focus {
    outline: none;
    border-color: #22c55e;
    box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
}

button {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(34,197,94,0.3);
}

button:active {
    transform: scale(0.97);
}

button i {
    margin-right: 8px;
}

.nav {
    display: flex;
    position: fixed;
    bottom: 0;
    width: 100%;
    max-width: 600px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(2, 6, 23, 0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(34, 197, 94, 0.3);
    border-radius: 30px 30px 0 0;
    z-index: 200;
}

.nav button {
    flex: 1;
    background: transparent;
    box-shadow: none;
    border-radius: 0;
    margin: 0;
    padding: 14px 0;
    font-size: 1.2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: all 0.2s;
    color: #94a3b8;
}

.nav button i {
    font-size: 1.4rem;
    margin: 0;
}

.nav button.active {
    color: #22c55e;
    background: rgba(34, 197, 94, 0.1);
    border-top: 2px solid #22c55e;
}

.alert {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    padding: 14px;
    border-radius: 16px;
    margin: 12px 0;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 500;
    animation: shake 0.3s ease;
}

@keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-4px)}
    75%{transform:translateX(4px)}
}

.result {
    background: #22c55e;
    padding: 12px;
    border-radius: 16px;
    margin-top: 12px;
    font-weight: bold;
    text-align: center;
}

.small {
    opacity: 0.7;
    font-size: 0.75rem;
}

.badge {
    background: #22c55e;
    color: #000;
    border-radius: 30px;
    padding: 2px 10px;
    font-size: 0.7rem;
    font-weight: bold;
    display: inline-block;
    margin-left: 8px;
}

.lista-item {
    background: #0f172a;
    margin: 10px 0;
    padding: 12px 16px;
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
    border-left: 3px solid #22c55e;
}

.lista-item:hover {
    background: #1e293b;
    transform: translateX(4px);
}

.lista-item-info {
    flex: 1;
}

.lista-item-nome {
    font-weight: 600;
    font-size: 1rem;
}

.lista-item-detalhe {
    font-size: 0.8rem;
    opacity: 0.7;
}

.delete-btn {
    background: #ef4444;
    padding: 6px 12px;
    width: auto;
    margin: 0;
    border-radius: 30px;
    font-size: 0.8rem;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 16px;
}

.stat-card {
    background: #0f172a;
    border-radius: 20px;
    padding: 14px;
    text-align: center;
}

.stat-value {
    font-size: 1.8rem;
    font-weight: bold;
    color: #22c55e;
}

canvas {
    max-height: 280px;
    margin-top: 16px;
    background: #0f172a;
    border-radius: 20px;
    padding: 10px;
}

.empty-state {
    text-align: center;
    padding: 40px 20px;
    opacity: 0.6;
}

.empty-state i {
    font-size: 3rem;
    margin-bottom: 12px;
}

hr {
    border-color: #334155;
    margin: 12px 0;
}
</style>
</head>
<body>
<header>
    <h1><i class="fas fa-dumbbell"></i> GYM PRO ELITE <i class="fas fa-chart-line"></i></h1>
</header>
<div class="container">
    <!-- TELA HOME -->
    <div id="home">
        <div id="alertas"></div>
        <div class="card">
            <h3><i class="fas fa-chart-pie"></i> Dashboard</h3>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="totalAlunos">0</div><div>Alunos Ativos</div></div>
                <div class="stat-card"><div class="stat-value" id="totalTreinos">0</div><div>Treinos Registrados</div></div>
                <div class="stat-card"><div class="stat-value" id="totalMetricas">0</div><div>Métricas Salvas</div></div>
                <div class="stat-card"><div class="stat-value" id="mediaIMC">0</div><div>IMC Médio</div></div>
            </div>
            <canvas id="graficoAlunos"></canvas>
            <canvas id="graficoTreinosDist" style="margin-top: 20px;"></canvas>
        </div>
    </div>

    <!-- TELA ALUNOS -->
    <div id="alunos" style="display:none">
        <div class="card">
            <h3><i class="fas fa-user-plus"></i> Novo Aluno</h3>
            <input id="nome" placeholder="Nome completo" autocomplete="off">
            <select id="plano">
                <option value="30">📆 Mensal (30 dias)</option>
                <option value="90">📅 Trimestral (90 dias)</option>
                <option value="365">🌟 Anual (365 dias)</option>
            </select>
            <button onclick="addAluno()"><i class="fas fa-save"></i> Cadastrar Aluno</button>
        </div>
        <div class="card">
            <h3><i class="fas fa-users"></i> Lista de Alunos</h3>
            <div id="listaAlunos"></div>
        </div>
    </div>

    <!-- TELA TREINOS A/B/C -->
    <div id="treinos" style="display:none">
        <div class="card">
            <h3><i class="fas fa-clipboard-list"></i> Ficha de Treino (A/B/C)</h3>
            <select id="alunoTreino"></select>
            <select id="tipoTreino">
                <option value="A">🔥 TREINO A (Superior)</option>
                <option value="B">💪 TREINO B (Inferior)</option>
                <option value="C">⚡ TREINO C (Full Body)</option>
            </select>
            <input id="descricaoTreino" placeholder="Ex: Supino, Rosca, Tríceps">
            <button onclick="salvarTreino()"><i class="fas fa-dumbbell"></i> Atribuir Treino</button>
        </div>
        <div class="card">
            <h3><i class="fas fa-history"></i> Histórico de Treinos</h3>
            <div id="listaTreinos"></div>
        </div>
    </div>

    <!-- TELA MÉTRICAS -->
    <div id="metricas" style="display:none">
        <div class="card">
            <h3><i class="fas fa-heartbeat"></i> Avaliação Física</h3>
            <select id="alunoMetrica"></select>
            <input id="peso" type="number" step="0.1" placeholder="Peso (kg)">
            <input id="altura" type="number" step="0.01" placeholder="Altura (m)">
            <input id="gordura" type="number" step="0.1" placeholder="% Gordura">
            <button onclick="salvarMetrica()"><i class="fas fa-chart-line"></i> Salvar Métrica</button>
        </div>
        <div class="card">
            <h3><i class="fas fa-chart-line"></i> Evolução de Peso</h3>
            <canvas id="graficoMetrica"></canvas>
            <div id="imcResultado" class="result" style="margin-top: 16px;"></div>
        </div>
    </div>
</div>

<div class="nav">
    <button onclick="show('home')" data-nav="home"><i class="fas fa-home"></i><span>Início</span></button>
    <button onclick="show('alunos')" data-nav="alunos"><i class="fas fa-users"></i><span>Alunos</span></button>
    <button onclick="show('treinos')" data-nav="treinos"><i class="fas fa-dumbbell"></i><span>Treinos</span></button>
    <button onclick="show('metricas')" data-nav="metricas"><i class="fas fa-chart-simple"></i><span>Métricas</span></button>
</div>

<script>
// DADOS GLOBAIS
let alunos = JSON.parse(localStorage.getItem("gym_alunos")) || [];
let treinos = JSON.parse(localStorage.getItem("gym_treinos")) || [];
let metricas = JSON.parse(localStorage.getItem("gym_metricas")) || [];

// Variáveis para os gráficos
let chartAlunos = null;
let chartMetrica = null;
let chartTreinosDist = null;

function saveAll(){
    localStorage.setItem("gym_alunos", JSON.stringify(alunos));
    localStorage.setItem("gym_treinos", JSON.stringify(treinos));
    localStorage.setItem("gym_metricas", JSON.stringify(metricas));
}

function show(pageId){
    document.querySelectorAll(".container > div").forEach(div => div.style.display = "none");
    document.getElementById(pageId).style.display = "block";
    
    // Atualizar botão ativo
    document.querySelectorAll(".nav button").forEach(btn => btn.classList.remove("active"));
    document.querySelector(`.nav button[data-nav="${pageId}"]`)?.classList.add("active");
    
    renderAll();
}

function addAluno(){
    let nome = document.getElementById("nome").value.trim();
    if(!nome){
        Swal.fire("Ops!", "Digite o nome do aluno", "warning");
        return;
    }
    let dias = parseInt(document.getElementById("plano").value);
    let venc = new Date();
    venc.setDate(venc.getDate() + dias);
    
    alunos.push({ id: Date.now(), nome, venc: venc.toISOString() });
    saveAll();
    document.getElementById("nome").value = "";
    Swal.fire("Sucesso!", `Aluno ${nome} cadastrado com sucesso!`, "success");
    renderAll();
}

function deleteAluno(id){
    Swal.fire({
        title: "Tem certeza?",
        text: "O aluno será removido junto com todos os treinos e métricas!",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#ef4444",
        confirmButtonText: "Sim, excluir!"
    }).then((result) => {
        if(result.isConfirmed){
            alunos = alunos.filter(a => a.id !== id);
            treinos = treinos.filter(t => t.alunoId !== id);
            metricas = metricas.filter(m => m.alunoId !== id);
            saveAll();
            Swal.fire("Excluído!", "Aluno removido com sucesso.", "success");
            renderAll();
        }
    });
}

function salvarTreino(){
    let selectAluno = document.getElementById("alunoTreino");
    let nomeAluno = selectAluno.value;
    if(!nomeAluno){
        Swal.fire("Erro", "Selecione um aluno", "error");
        return;
    }
    let aluno = alunos.find(a => a.nome === nomeAluno);
    if(!aluno) return;
    
    let tipo = document.getElementById("tipoTreino").value;
    let desc = document.getElementById("descricaoTreino").value.trim();
    if(!desc){
        Swal.fire("Atenção", "Descreva os exercícios do treino", "info");
        return;
    }
    
    treinos.push({
        id: Date.now(),
        alunoId: aluno.id,
        nome: aluno.nome,
        tipo,
        desc,
        dataCriacao: new Date().toISOString()
    });
    saveAll();
    document.getElementById("descricaoTreino").value = "";
    Swal.fire("Treino salvo!", `Treino ${tipo} atribuído para ${aluno.nome}`, "success");
    renderAll();
}

function deleteTreino(id){
    treinos = treinos.filter(t => t.id !== id);
    saveAll();
    Swal.fire("Removido!", "Treino excluído com sucesso.", "info");
    renderAll();
}

function salvarMetrica(){
    let selectAluno = document.getElementById("alunoMetrica");
    let nomeAluno = selectAluno.value;
    if(!nomeAluno){
        Swal.fire("Erro", "Selecione um aluno", "error");
        return;
    }
    let aluno = alunos.find(a => a.nome === nomeAluno);
    if(!aluno) return;
    
    let peso = parseFloat(document.getElementById("peso").value);
    let altura = parseFloat(document.getElementById("altura").value);
    let gordura = parseFloat(document.getElementById("gordura").value);
    
    if(isNaN(peso) || isNaN(altura)){
        Swal.fire("Atenção", "Preencha peso e altura corretamente", "warning");
        return;
    }
    
    let imc = peso / (altura * altura);
    metricas.push({
        id: Date.now(),
        alunoId: aluno.id,
        nome: aluno.nome,
        peso,
        altura,
        gordura: isNaN(gordura) ? null : gordura,
        imc: imc.toFixed(1),
        data: new Date().toISOString()
    });
    saveAll();
    document.getElementById("peso").value = "";
    document.getElementById("altura").value = "";
    document.getElementById("gordura").value = "";
    Swal.fire("Métrica salva!", `IMC calculado: ${imc.toFixed(1)}`, "success");
    renderAll();
}

function deleteMetrica(id){
    metricas = metricas.filter(m => m.id !== id);
    saveAll();
    renderAll();
}

// RENDERIZAÇÕES
function renderAlunos(){
    let container = document.getElementById("listaAlunos");
    if(alunos.length === 0){
        container.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash"></i><br>Nenhum aluno cadastrado</div>`;
        return;
    }
    container.innerHTML = alunos.map(aluno => `
        <div class="lista-item">
            <div class="lista-item-info">
                <div class="lista-item-nome"><i class="fas fa-user"></i> ${aluno.nome}</div>
                <div class="lista-item-detalhe">📅 Venc: ${new Date(aluno.venc).toLocaleDateString('pt-BR')}</div>
            </div>
            <button class="delete-btn" onclick="deleteAluno(${aluno.id})"><i class="fas fa-trash"></i></button>
        </div>
    `).join("");
}

function renderTreinos(){
    let container = document.getElementById("listaTreinos");
    if(treinos.length === 0){
        container.innerHTML = `<div class="empty-state"><i class="fas fa-clipboard"></i><br>Nenhum treino cadastrado</div>`;
        return;
    }
    let treinosOrdenados = [...treinos].reverse();
    container.innerHTML = treinosOrdenados.map(t => `
        <div class="lista-item">
            <div class="lista-item-info">
                <div class="lista-item-nome"><i class="fas fa-dumbbell"></i> ${t.nome} - Treino ${t.tipo}</div>
                <div class="lista-item-detalhe">📝 ${t.desc.substring(0, 60)}${t.desc.length > 60 ? '...' : ''}</div>
                <div class="small">📅 ${new Date(t.dataCriacao).toLocaleDateString('pt-BR')}</div>
            </div>
            <button class="delete-btn" onclick="deleteTreino(${t.id})"><i class="fas fa-trash"></i></button>
        </div>
    `).join("");
}

function renderSelects(){
    let options = alunos.map(a => `<option value="${a.nome}">${a.nome}</option>`).join("");
    document.getElementById("alunoTreino").innerHTML = options || "<option>Nenhum aluno cadastrado</option>";
    document.getElementById("alunoMetrica").innerHTML = options || "<option>Nenhum aluno cadastrado</option>";
}

function verificarVencimentos(){
    let hoje = new Date();
    hoje.setHours(0,0,0,0);
    let alertasHtml = "";
    let vencidos = alunos.filter(a => new Date(a.venc) < hoje);
    vencidos.forEach(aluno => {
        alertasHtml += `<div class="alert"><i class="fas fa-exclamation-triangle"></i> ⚠️ ${aluno.nome} - Plano VENCIDO! Renove agora.</div>`;
    });
    let proximosVencer = alunos.filter(a => {
        let diff = (new Date(a.venc) - hoje) / (1000*60*60*24);
        return diff <= 7 && diff >= 0;
    });
    proximosVencer.forEach(aluno => {
        let dias = Math.ceil((new Date(aluno.venc) - hoje) / (1000*60*60*24));
        alertasHtml += `<div class="alert" style="background:#f97316;"><i class="fas fa-clock"></i> ⏰ ${aluno.nome} - Vence em ${dias} dias!</div>`;
    });
    document.getElementById("alertas").innerHTML = alertasHtml || `<div class="card small" style="text-align:center">✅ Todos os alunos com plano em dia!</div>`;
}

function renderDashboard(){
    document.getElementById("totalAlunos").innerText = alunos.length;
    document.getElementById("totalTreinos").innerText = treinos.length;
    document.getElementById("totalMetricas").innerText = metricas.length;
    
    let imcs = metricas.map(m => parseFloat(m.imc)).filter(i => !isNaN(i));
    let mediaImc = imcs.length ? (imcs.reduce((a,b)=>a+b,0)/imcs.length).toFixed(1) : 0;
    document.getElementById("mediaIMC").innerText = mediaImc;
    
    // Gráfico de barras - evolução de alunos por mês
    const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    let contagemMeses = new Array(12).fill(0);
    alunos.forEach(aluno => {
        let dataCad = new Date(aluno.venc);
        let mes = dataCad.getMonth();
        contagemMeses[mes]++;
    });
    if(chartAlunos) chartAlunos.destroy();
    let ctx = document.getElementById("graficoAlunos").getContext("2d");
    chartAlunos = new Chart(ctx, {
        type: 'bar',
        data: { labels: meses, datasets: [{ label: 'Alunos cadastrados', data: contagemMeses, backgroundColor: '#22c55e', borderRadius: 10 }] },
        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#fff' } } } }
    });
    
    // Gráfico de distribuição de treinos A/B/C
    let countA = treinos.filter(t => t.tipo === 'A').length;
    let countB = treinos.filter(t => t.tipo === 'B').length;
    let countC = treinos.filter(t => t.tipo === 'C').length;
    if(chartTreinosDist) chartTreinosDist.destroy();
    let ctxDist = document.getElementById("graficoTreinosDist").getContext("2d");
    chartTreinosDist = new Chart(ctxDist, {
        type: 'doughnut',
        data: { labels: ['Treino A', 'Treino B', 'Treino C'], datasets: [{ data: [countA, countB, countC], backgroundColor: ['#22c55e', '#3b82f6', '#f97316'] }] },
        options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } } }
    });
}

function renderGraficoMetrica(){
    let select = document.getElementById("alunoMetrica");
    let nomeSelecionado = select.value;
    if(!nomeSelecionado || alunos.length === 0){
        if(chartMetrica) chartMetrica.destroy();
        document.getElementById("imcResultado").innerHTML = "📊 Selecione um aluno para ver evolução";
        return;
    }
    let metricasAluno = metricas.filter(m => m.nome === nomeSelecionado).sort((a,b)=>new Date(a.data)-new Date(b.data));
    if(metricasAluno.length === 0){
        if(chartMetrica) chartMetrica.destroy();
        document.getElementById("imcResultado").innerHTML = "📉 Nenhuma métrica registrada para este aluno ainda.";
        return;
    }
    let labels = metricasAluno.map(m => new Date(m.data).toLocaleDateString('pt-BR'));
    let pesos = metricasAluno.map(m => m.peso);
    
    if(chartMetrica) chartMetrica.destroy();
    let ctx = document.getElementById("graficoMetrica").getContext("2d");
    chartMetrica = new Chart(ctx, {
        type: 'line',
        data: { labels: labels, datasets: [{ label: 'Peso (kg)', data: pesos, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.1)', fill: true, tension: 0.3, pointBackgroundColor: '#22c55e' }] },
        options: { responsive: true, plugins: { tooltip: { callbacks: { label: (ctx) => `${ctx.raw} kg` } } } }
    });
    let ultima = metricasAluno[metricasAluno.length-1];
    let imcAtual = ultima.imc;
    let status = "";
    if(imcAtual < 18.5) status = "Abaixo do peso 🟡";
    else if(imcAtual < 25) status = "Peso normal 🟢";
    else if(imcAtual < 30) status = "Sobrepeso 🟠";
    else status = "Obesidade 🔴";
    document.getElementById("imcResultado").innerHTML = `📊 IMC Atual: ${imcAtual} - ${status} | Última avaliação: ${new Date(ultima.data).toLocaleDateString('pt-BR')}`;
}

function renderAll(){
    renderAlunos();
    renderTreinos();
    renderSelects();
    renderDashboard();
    renderGraficoMetrica();
    verificarVencimentos();
}

// Inicialização
renderAll();
show('home');

// Atualiza gráfico quando muda select de métricas
document.getElementById("alunoMetrica")?.addEventListener("change", () => renderGraficoMetrica());
</script>
</body>
</html>
